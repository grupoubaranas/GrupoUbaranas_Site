<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Central de Suporte | Grupo Ubaranas</title>

    <meta name="description"
        content="Central de Suporte do Grupo Ubaranas. Consulte sua Ordem de Serviço, Garantia e entre em contato com nossa equipe.">

    <link rel="icon" href="../faviconubaranas.png">

    <link rel="stylesheet" href="css/atendimentos.css">
</head>

<body>

    <main class="container">

        <!-- CABEÇALHO -->
        <header class="cabecalho">

            <div class="logo">
                <img src="../assets/logo/logo.png" alt="Grupo Ubaranas">
            </div>

            <div class="titulo">

                <h1>CENTRAL DE SUPORTE</h1>

                <p>
                    Conectando tecnologia, segurança e confiança.
                </p>

            </div>

        </header>

        <!-- CONSULTA -->

        <section class="consulta">

            <h2>Consultar Ordem de Serviço</h2>

            <p>
                Informe o número da Ordem de Serviço para visualizar
                o histórico da manutenção realizada.
            </p>

            <div class="form-consulta">

                <input
                    type="text"
                    id="numeroOS"
                    placeholder="Ex.: UB-260001">

                <button id="btnConsultar">

                    Consultar

                </button>

            </div>

        </section>

        <!-- RESULTADO -->

        <section id="resultado" class="resultado">

            <!-- Conteúdo será carregado pelo JavaScript -->

        </section>

        <!-- ACESSO RÁPIDO -->

        <section class="atalhos">

            <a
                href="https://wa.me/5521977433837"
                target="_blank"
                class="card">

                WhatsApp

            </a>

            <a
                href="mailto:contato@grupoubaranas.com.br"
                class="card">

                E-mail

            </a>

            <a
                href="/"
                class="card">

                Site Oficial

            </a>

        </section>

    </main>

    <footer>

        <p>

            Grupo Ubaranas

        </p>

        <p>

            CNPJ: 49.187.630/0001-06

        </p>

    </footer>

    <script src="js/atendimentos.js"></script>

</body>

</html>
